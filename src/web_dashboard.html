<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF Tracker 仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f1117; color: #e1e4e8;
  min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
header {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px;
  padding: 16px 0; border-bottom: 1px solid #21262d; margin-bottom: 24px;
}
header h1 { font-size: 22px; color: #f0f6fc; }
header h1 span { color: #58a6ff; }
.header-meta { font-size: 13px; color: #8b949e; }

.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card {
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  padding: 20px; position: relative; overflow: hidden;
}
.card-label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.card-value { font-size: 26px; font-weight: 700; }
.card-value.green { color: #3fb950; }
.card-value.red { color: #f85149; }

.chart-container {
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  padding: 20px; margin-bottom: 24px;
}
.chart-container h3 { font-size: 15px; margin-bottom: 16px; color: #f0f6fc; }
.chart-wrapper { position: relative; height: 320px; }

.table-container {
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  overflow: hidden; margin-bottom: 24px;
}
.table-header {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
  padding: 16px 20px; border-bottom: 1px solid #30363d;
}
.table-header h3 { font-size: 15px; color: #f0f6fc; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: 10px 12px; font-size: 12px;
  color: #8b949e; text-transform: uppercase; letter-spacing: 0.3px;
  border-bottom: 1px solid #21262d; white-space: nowrap;
}
td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #21262d; }
tr:hover td { background: #1c2128; }
.text-right { text-align: right; }
.text-green { color: #3fb950; }
.text-red { color: #f85149; }
.text-muted { color: #8b949e; }
.bold { font-weight: 600; }

.loading {
  text-align: center; padding: 60px 20px; color: #8b949e;
}
.loading .spinner {
  width: 36px; height: 36px; border: 3px solid #30363d;
  border-top-color: #58a6ff; border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.btn {
  background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
  padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
  transition: background 0.2s;
}
.btn:hover { background: #30363d; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
.btn-primary:hover { background: #388bfd; }
.btn-sm { padding: 3px 8px; font-size: 11px; }
.btn-edit { background: transparent; border: 1px solid #30363d; color: #8b949e; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.btn-edit:hover { border-color: #58a6ff; color: #58a6ff; }
.btn-del { background: transparent; border: 1px solid #30363d; color: #8b949e; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.btn-del:hover { border-color: #f85149; color: #f85149; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 1000;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #161b22; border: 1px solid #30363d; border-radius: 10px;
  padding: 24px; width: 90%; max-width: 460px; max-height: 90vh; overflow-y: auto;
}
.modal h2 { font-size: 17px; color: #f0f6fc; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 4px; }
.form-group input, .form-group select {
  width: 100%; padding: 8px 12px; background: #0d1117;
  border: 1px solid #30363d; border-radius: 6px;
  color: #e1e4e8; font-size: 14px; outline: none;
}
.form-group input:focus { border-color: #58a6ff; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-hint { font-size: 11px; color: #8b949e; margin-top: 3px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 2000;
  background: #1c2128; border: 1px solid #30363d; border-radius: 8px;
  padding: 12px 20px; font-size: 13px;
  opacity: 0; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }
.toast.success { border-left: 3px solid #3fb950; }
.toast.error { border-left: 3px solid #f85149; }

.badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; }
.badge-manual { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb44; }
.badge-auto { background: #8b949e22; color: #8b949e; }

@media (max-width: 768px) {
  .cards { grid-template-columns: 1fr 1fr; }
  .table-container { overflow-x: auto; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📊 <span>ETF</span> Tracker</h1>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span class="header-meta" id="headerMeta">加载中...</span>
      <button class="btn btn-primary" onclick="refreshData()" id="refreshBtn">🔄 刷新数据</button>
    </div>
  </header>

  <div class="cards" id="summaryCards">
    <div class="card"><div class="card-label">总投入</div><div class="card-value" id="totalCost">—</div></div>
    <div class="card"><div class="card-label">总市值</div><div class="card-value" id="totalValue">—</div></div>
    <div class="card"><div class="card-label">总盈亏</div><div class="card-value" id="totalPnl">—</div></div>
    <div class="card"><div class="card-label">数据时效</div><div class="card-value" id="dataFresh" style="font-size:15px">—</div></div>
  </div>

  <div class="chart-container">
    <h3>📈 组合净值走势</h3>
    <div class="chart-wrapper"><canvas id="portfolioChart"></canvas></div>
  </div>

  <div class="table-container" id="holdingsTable">
    <div class="table-header">
      <h3>📦 持仓明细</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="text-muted" id="holdingsCount" style="font-size:13px"></span>
        <button class="btn btn-sm btn-primary" onclick="openAddModal()">➕ 新增</button>
      </div>
    </div>
    <div class="loading" id="holdingsLoading">
      <div class="spinner"></div>
      <div>正在加载数据...</div>
    </div>
  </div>
</div>

<!-- 编辑/新增 Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2 id="modalTitle">编辑持仓</h2>
    <input type="hidden" id="editId" value="">

    <div class="form-group">
      <label>基金代码</label>
      <select id="editCode"></select>
      <div class="form-hint">选择基金代码，或先刷新数据获取最新基金列表</div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>持有份数</label>
        <input type="number" id="editShares" step="0.0001" min="0" placeholder="0">
        <div class="form-hint">手动填写的份数会覆盖自动计算值</div>
      </div>
      <div class="form-group">
        <label>投入金额 (¥)</label>
        <input type="number" id="editCost" step="0.01" min="0" placeholder="0">
        <div class="form-hint">总买入成本，用于计算盈亏</div>
      </div>
    </div>

    <div class="form-group">
      <label>备注</label>
      <input type="text" id="editNote" placeholder="例如：定投/手动买入">
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveHolding()">💾 保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let portfolioChart = null;
let isRefreshing = false;

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── 模态框 ──────────────────────────────────────────────

function openModal() {
  document.getElementById('editModal').classList.add('show');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('show');
}
document.getElementById('editModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

function openAddModal() {
  document.getElementById('modalTitle').textContent = '➕ 新增持仓';
  document.getElementById('editId').value = '';
  document.getElementById('editShares').value = '';
  document.getElementById('editCost').value = '';
  document.getElementById('editNote').value = '';
  openModal();
}

function openEditModal(h) {
  document.getElementById('modalTitle').textContent = '✏️ 编辑: ' + h.fund_name;
  document.getElementById('editId').value = h.id || '';
  document.getElementById('editCode').value = h.fund_code;
  document.getElementById('editShares').value = h.shares > 0 ? h.shares : '';
  document.getElementById('editCost').value = h.cost_basis > 0 ? h.cost_basis : '';
  document.getElementById('editNote').value = h.note || '';
  openModal();
}

async function saveHolding() {
  const payload = {
    fund_code: document.getElementById('editCode').value,
    fund_name: '',
    shares: parseFloat(document.getElementById('editShares').value) || 0,
    cost_basis: parseFloat(document.getElementById('editCost').value) || 0,
    purchase_date: '',
    note: document.getElementById('editNote').value || '',
  };

  if (!payload.fund_code) {
    toast('请选择基金代码', 'error');
    return;
  }

  try {
    const res = await fetch('/api/holdings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error('Save failed');
    toast('✅ 持仓已保存（刷新后生效）', 'success');
    closeModal();
  } catch (e) {
    toast('❌ 保存失败: ' + e.message, 'error');
  }
}

async function deleteHolding(id, name) {
  if (!confirm('确定删除 ' + name + ' 的手动持仓记录？')) return;
  try {
    const res = await fetch('/api/holdings/' + id, { method: 'DELETE' });
    if (!res.ok) throw new Error('Delete failed');
    toast('🗑️ 已删除（刷新后生效）', 'success');
    loadFromCache();
  } catch (e) {
    toast('❌ 删除失败: ' + e.message, 'error');
  }
}

// ── 加载基金列表到下拉框 ────────────────────────────────

async function loadFundList() {
  try {
    const res = await fetch('/api/funds');
    const funds = await res.json();
    const sel = document.getElementById('editCode');
    sel.innerHTML = '<option value="">— 选择基金 —</option>';
    for (const f of funds) {
      sel.innerHTML += `<option value="${f.code}">${f.name} (${f.code})</option>`;
    }
  } catch (e) {
    console.error('load funds failed:', e);
  }
}

// ── 主数据加载 ──────────────────────────────────────────

async function loadFromCache() {
  loadFundList();
  try {
    const [pRes, hRes] = await Promise.all([
      fetch('/api/portfolio'),
      fetch('/api/history/portfolio?days=60'),
    ]);
    if (!pRes.ok) throw new Error('API error');
    const p = await pRes.json();
    if (p.status === 'waiting') {
      document.getElementById('holdingsLoading').innerHTML =
        `<div class="loading">⏳ 首次数据获取中（30-60s），请稍后刷新页面...</div>`;
      return;
    }
    const h = await hRes.json();
    renderAll(p, h);
  } catch (e) {
    document.getElementById('holdingsLoading').innerHTML =
      `<div class="loading">暂无缓存数据，点击「刷新数据」首次获取</div>`;
    document.getElementById('headerMeta').textContent = '待首次刷新';
  }
}

async function refreshData() {
  if (isRefreshing) return;
  isRefreshing = true;
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 获取中...';
  document.getElementById('holdingsLoading').style.display = 'block';

  try {
    const res = await fetch('/api/refresh', { method: 'POST' });
    const r = await res.json();
    toast(`✅ 刷新完成 · ${r.fetched} · ${r.date}`, 'success');
    await loadFromCache();
  } catch (e) {
    toast('❌ 刷新失败: ' + e.message, 'error');
  } finally {
    isRefreshing = false;
    btn.disabled = false;
    btn.textContent = '🔄 刷新数据';
  }
}

function renderAll(p, h) {
  const pnlClass = p.total_pnl >= 0 ? 'green' : 'red';
  document.getElementById('totalCost').textContent = '¥' + fmt(p.total_cost);
  document.getElementById('totalValue').textContent = '¥' + fmt(p.total_value);
  document.getElementById('totalPnl').textContent =
    (p.total_pnl >= 0 ? '+' : '') + '¥' + fmt(p.total_pnl) +
    ' (' + (p.total_pnl_pct >= 0 ? '+' : '') + p.total_pnl_pct.toFixed(2) + '%)';
  document.getElementById('totalPnl').className = 'card-value ' + pnlClass;
  document.getElementById('dataFresh').textContent = p.date;
  document.getElementById('headerMeta').textContent =
    '📅 ' + (p.date || '').split(' ')[0] + ' · ' + p.fetched_count + '/' + p.funds_count;
  renderChart(h);
  renderTable(p.holdings);
}

function renderChart(history) {
  const ctx = document.getElementById('portfolioChart').getContext('2d');
  if (portfolioChart) portfolioChart.destroy();

  if (!history.dates || history.dates.length < 2) {
    portfolioChart = new Chart(ctx, {
      type: 'line',
      data: { labels: ['暂无数据'], datasets: [{ data: [0], borderColor: '#58a6ff' }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
    return;
  }

  portfolioChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: history.dates,
      datasets: [{
        label: '组合净值',
        data: history.values,
        borderColor: '#58a6ff',
        backgroundColor: 'rgba(88, 166, 255, 0.08)',
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c2128', titleColor: '#f0f6fc',
          bodyColor: '#e1e4e8', borderColor: '#30363d', borderWidth: 1,
          callbacks: { label: ctx => ctx.parsed.y.toFixed(2) + '%' }
        }
      },
      scales: {
        x: { grid: { color: '#21262d', drawBorder: false }, ticks: { color: '#8b949e', maxTicksLimit: 10 } },
        y: { grid: { color: '#21262d', drawBorder: false }, ticks: { color: '#8b949e', callback: v => v.toFixed(1) + '%' } }
      }
    }
  });
}

function renderTable(holdings) {
  const container = document.getElementById('holdingsTable');
  const loading = document.getElementById('holdingsLoading');
  loading.style.display = 'none';

  if (!holdings || holdings.length === 0) {
    container.innerHTML = `
      <div class="table-header"><h3>📦 持仓明细</h3></div>
      <div style="padding:40px;text-align:center;color:#8b949e">暂无持仓数据</div>`;
    return;
  }

  let rows = '';
  for (const h of holdings) {
    const pc = h.pnl >= 0 ? 'text-green' : 'text-red';
    const sign = h.pnl >= 0 ? '+' : '';
    const pnlStr = (h.pnl === 0 && h.pnl_pct === 0) ? '—' : sign + '¥' + fmt(h.pnl);
    const pnlPctStr = (h.pnl === 0 && h.pnl_pct === 0) ? '—' : sign + h.pnl_pct.toFixed(2) + '%';
    const isManual = h.note || h.cost_basis > 0;
    const badge = isManual ? '<span class="badge badge-manual">手动</span>' : '<span class="badge badge-auto">自动</span>';

    rows += `<tr>
      <td>
        <div><b>${esc(h.fund_name)}</b> ${badge}</div>
        <span class="text-muted" style="font-size:11px">${h.fund_code}${h.note ? ' · ' + esc(h.note) : ''}</span>
      </td>
      <td class="text-right">${h.shares > 0 ? h.shares.toFixed(4) : '—'}</td>
      <td class="text-right">${h.cost_basis > 0 ? '¥' + fmt(h.cost_basis) : '—'}</td>
      <td class="text-right">${h.current_value > 0 ? '¥' + fmt(h.current_value) : '—'}</td>
      <td class="text-right ${pc} bold">${pnlStr}</td>
      <td class="text-right ${pc} bold">${pnlPctStr}</td>
      <td class="text-right">${h.current_nav > 0 ? h.current_nav.toFixed(4) : '—'}</td>
      <td class="text-right" style="white-space:nowrap">
        <button class="btn-edit" onclick="openEditModal({
          id:${h.id},fund_code:'${h.fund_code}',fund_name:'${escAttr(h.fund_name)}',
          shares:${h.shares},cost_basis:${h.cost_basis},note:'${escAttr(h.note)}'
        })">✏️</button>
        <button class="btn-del" onclick="deleteHolding(${h.id},'${escAttr(h.fund_name)}')" ${h.id ? '' : 'disabled style="opacity:0.3"'}>🗑️</button>
      </td>
    </tr>`;
  }

  document.querySelector('.table-header span').textContent = '共 ' + holdings.length + ' 只基金';
  const oldTable = container.querySelector('table');
  if (oldTable) oldTable.remove();

  const table = document.createElement('table');
  table.innerHTML = `<thead><tr>
    <th>基金</th><th class="text-right">份数</th><th class="text-right">投入(¥)</th>
    <th class="text-right">市值(¥)</th><th class="text-right">盈亏(¥)</th>
    <th class="text-right">盈亏%</th><th class="text-right">净值</th>
    <th class="text-right" style="width:60px">操作</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
  container.appendChild(table);
}

function fmt(v) {
  return Math.abs(v).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function escAttr(s) {
  if (!s) return '';
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

loadFromCache();
</script>
</body>
</html>
