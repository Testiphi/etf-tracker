name: ETF 日报追踪

on:
  # 定时触发（北京时间 20:00 = UTC 12:00）
  schedule:
    - cron: '0 12 * * 1-5'   # 周一到周五 UTC 12:00 = CST 20:00
  # 也可手动触发
  workflow_dispatch:

# 给 GITHUB_TOKEN 写入权限，用于最后的数据存档 git push
permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行追踪脚本
        env:
          OUTLOOK_EMAIL: ${{ secrets.OUTLOOK_EMAIL }}
          OUTLOOK_PASSWORD: ${{ secrets.OUTLOOK_PASSWORD }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python src/main.py

      - name: 提交数据存档
        run: |
          git config user.name "ETF Bot"
          git config user.email "etf-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "auto report $(date +'%Y-%m-%d')"
          # 使用 GITHUB_TOKEN 认证推送
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
          git push
